name: Daily Recap Long-Form

on:
  schedule:
    # Run every day at 5:30 PM Eastern (22:30 UTC)
    - cron: '30 22 * * *'
  workflow_dispatch:

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  generate-recap:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Run Daily Recap Script
        run: python daily_recap.py
      
      - name: Commit updated recap data
        run: |
          git config user.name "The Policy Brief Bot"
          git config user.email "bot@thepolicybrief.com"
          git add web/src/data/
          git diff --staged --quiet || git commit -m "🤖 Daily recap generated $(date +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push
