name: Friday Newsletter (5:00 PM CST)

on:
  schedule:
    # 5:00 PM CST = 11:00 PM UTC (CST is UTC-6)
    - cron: '0 23 * * 5'
  workflow_dispatch: # Allow manual trigger

env:
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.13'
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Send Weekly Newsletter
        run: |
          python -c "
          import os, json
          from engine import ResendMessenger
          from dotenv import load_dotenv

          resend_key = os.environ.get('RESEND_API_KEY')
          delivery = ResendMessenger(resend_key)

          data_path = 'web/src/data/daily_audits.json'
          if os.path.exists(data_path):
              with open(data_path) as f:
                  audits = json.load(f)
              delivery.send_weekly_briefing(audits, 'mattfuller85@gmail.com')
              print('✅ Friday newsletter sent!')
          else:
              print('⚠️ No audit data found. Skipping newsletter.')
          "
