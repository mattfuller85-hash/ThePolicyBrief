name: 5-Minute Congress Check

on:
  schedule:
    # Run every 5 minutes between 8am and 5pm Eastern (13:00 - 22:00 UTC)
    # Note: GitHub Actions enforces a strict 5-minute minimum interval on cron schedules.
    - cron: '*/5 13-22 * * *'
  workflow_dispatch:
    inputs:
      force_reset:
        description: 'Reset all known bills and reprocess from scratch?'
        required: false
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: write

jobs:
  check-and-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.13'
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Run Congress Check (5-Minute Interval)
        run: python hourly_check.py
        env:
          FORCE_RESET: ${{ github.event.inputs.force_reset || 'no' }}
          
      - name: Run YouTube Video Backwash Crawler
        run: python crawler.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
      
      - name: Generate Thumbnails (if new audits were added)
        run: |
          python -c "
          import json, os
          from thumbnail import ThumbnailGenerator
          gen = ThumbnailGenerator()
          data_path = 'web/src/data/daily_audits.json'
          if os.path.exists(data_path):
              with open(data_path) as f:
                  audits = json.load(f)
              for audit in audits:
                  gen.generate_thumbnail(audit)
          else:
              print('No audit data to generate thumbnails for.')
          "
      
      - name: Commit updated data & thumbnails
        run: |
          git config user.name "The Policy Brief Bot"
          git config user.email "bot@thepolicybrief.com"
          git add web/src/data/ web/public/thumbnails/
          git diff --staged --quiet || git commit -m "🤖 Hourly audit update $(date +%Y-%m-%d-%H%M)"
          git pull --rebase --autostash origin main
          git push
