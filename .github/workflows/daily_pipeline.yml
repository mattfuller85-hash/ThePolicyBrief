name: Daily Pipeline (3:00 AM CST)

on:
  schedule:
    # 3:00 AM CST = 8:00 AM UTC (CST is UTC-6)
    # During CDT (daylight saving), 3:00 AM CDT = 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

jobs:
  audit-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Run Daily Pipeline (Fetch, Audit, Email)
        run: python pipeline.py
      
      - name: Run YouTube Crawler (Backwash Effect)
        run: python crawler.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
      
      - name: Generate Thumbnails
        run: |
          python -c "
          import json
          from thumbnail import ThumbnailGenerator
          gen = ThumbnailGenerator()
          with open('web/src/data/daily_audits.json') as f:
              audits = json.load(f)
          for audit in audits:
              gen.generate_thumbnail(audit)
          "
      
      - name: Commit updated data & thumbnails
        run: |
          git config user.name "The Policy Brief Bot"
          git config user.email "bot@thepolicybrief.com"
          git add web/src/data/ web/public/thumbnails/
          git diff --staged --quiet || git commit -m "🤖 Daily audit data update $(date +%Y-%m-%d)"
          git push
